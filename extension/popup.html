<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0; width: 280px; padding: 14px;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #1e1e2e; color: #cdd6f4;
      }
      h1 { font-size: 14px; margin: 0 0 10px; color: #cba6f7; }
      .row { font-size: 11px; color: #a6adc8; margin-bottom: 8px; word-break: break-all; }
      select, button {
        width: 100%; box-sizing: border-box; border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.1); background: #313244;
        color: #cdd6f4; padding: 8px; font-size: 13px; margin-bottom: 8px;
      }
      button {
        background: linear-gradient(90deg, #cba6f7, #89b4fa);
        color: #11111b; font-weight: 600; cursor: pointer; border: none;
      }
      button:disabled { opacity: 0.5; cursor: default; }
      #status { font-size: 11px; min-height: 14px; color: #a6e3a1; }
      #status.err { color: #f38ba8; }
    </style>
  </head>
  <body>
    <h1>Save to PrepForge</h1>
    <div class="row" id="title">…</div>
    <select id="topic">
      <option>AI</option>
      <option>Machine Learning</option>
      <option>Data Science</option>
      <option>Data Analytics</option>
    </select>
    <button id="save">Save this page</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>

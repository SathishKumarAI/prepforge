# Obsidian vault ingestion. Points at your local vault of interview PDFs/notes.
# Only files whose folder or filename matches the interview/question patterns are
# scanned — random books in the vault are skipped.

path: "/home/deva/coding/Obsidian Vault"

# a file is ingested if its folder is in include_folders OR its name matches a keyword
include_folders: ["Interview"]
include_keywords: ["interview", "question", "questions", "q&a", "qna"]

max_pages_per_pdf: 80     # cap so huge books don't hang extraction
max_questions: 2000       # safety cap on total questions

# PrepForge scrape sources. Edit freely, then hit "Refresh" in the app.

# RSS / Atom feeds (blogs, Substack, Medium tags). Pulled via feedparser.
rss:
  - name: "Machine Learning Mastery"
    url: "https://machinelearningmastery.com/feed/"
    topic: "Machine Learning"
  - name: "Google AI Blog"
    url: "https://blog.google/technology/ai/rss/"
    topic: "AI"
  - name: "Towards Data Science"
    url: "https://towardsdatascience.com/feed"
    topic: "Data Science"
  - name: "KDnuggets"
    url: "https://www.kdnuggets.com/feed"
    topic: "Data Analytics"

# YouTube channels/searches. Needs YOUTUBE_API_KEY in .env (free, Data API v3).
# Leave list empty to skip. channel_id OR search query.
youtube:
  - name: "StatQuest"
    channel_id: "UCtYLUTtgS3k1Fg4y5tAhLbw"
    topic: "Machine Learning"
  - name: "AI interview questions"
    search: "AI ML interview questions"
    topic: "AI"

# Arbitrary web pages, best-effort HTML extraction (title + first paragraphs + links).
# May break per-site; failures are logged and skipped, never fatal.
html:
  - name: "GeeksforGeeks ML Interview"
    url: "https://www.geeksforgeeks.org/machine-learning-interview-questions/"
    topic: "Machine Learning"
